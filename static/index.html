<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Votal Shield</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg-2: #12121a;
    --bg-3: #1a1a24;
    --bg-hover: #1f1f2c;
    --border: #27272f;
    --border-strong: #3a3a45;
    --text: #e4e4e7;
    --text-dim: #a1a1aa;
    --text-muted: #71717a;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --accent-dim: rgba(99, 102, 241, 0.15);
    --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Inter", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .shell {
    width: min(860px, 100%);
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .hero {
    padding: 28px 28px 18px;
    border-bottom: 1px solid var(--border);
    text-align: left;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: var(--text-dim);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .eyebrow::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--accent);
    box-shadow: 0 0 0 6px var(--accent-dim);
  }

  h1 {
    margin: 16px 0 8px;
    font-size: clamp(34px, 5vw, 56px);
    line-height: 0.95;
    letter-spacing: -0.05em;
    font-weight: 700;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
    padding: 18px 28px;
  }

  .card {
    display: block;
    text-decoration: none;
    color: inherit;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px;
    transition: border-color 0.12s ease, background 0.12s ease;
  }

  .card:hover {
    border-color: var(--border-strong);
    background: var(--bg-hover);
  }

  .card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 16px;
    margin-bottom: 14px;
    background: linear-gradient(135deg, var(--accent) 0%, #a855f7 100%);
    color: #fff;
  }

  .chevron {
    color: var(--text-muted);
    font-size: 20px;
    line-height: 1;
    padding-top: 4px;
  }

  .label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--text-muted);
  }

  .title {
    margin-top: 8px;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .copy {
    margin-top: 8px;
    color: var(--text-dim);
    line-height: 1.55;
    font-size: 13.5px;
    max-width: 28ch;
  }

  .footer {
    padding: 0 28px 22px;
    color: var(--text-muted);
    font-size: 12px;
    text-align: left;
  }

  .footer a {
    color: var(--text-dim);
    text-decoration: none;
  }

  .footer a:hover { text-decoration: underline; }

  @media (max-width: 820px) {
    .hero { padding: 22px 18px 14px; }
    .grid {
      grid-template-columns: 1fr;
      padding: 14px 18px;
    }
    .title { font-size: 18px; }
    .copy { max-width: none; }
    .footer { padding: 0 18px 18px; }
  }
</style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="eyebrow">Votal Shield</div>
      <h1>Choose your workspace</h1>
    </section>

    <section class="grid">
      <a class="card admin" href="/admin">
        <div class="card-head">
          <div class="icon">A</div>
          <div class="chevron" aria-hidden="true">›</div>
        </div>
        <div class="label">For platform operators</div>
        <div class="title">Admin Console</div>
        <div class="copy">Manage tenants, review activity, and control the platform.</div>
      </a>

      <a class="card tenant" href="/tenant">
        <div class="card-head">
          <div class="icon">T</div>
          <div class="chevron" aria-hidden="true">›</div>
        </div>
        <div class="label">For tenant teams</div>
        <div class="title">Tenant Portal</div>
        <div class="copy">Manage policies, agents, API keys, and tenant usage.</div>
      </a>
    </section>

    <div class="footer">
      <a href="/service-info">Service info</a>
    </div>
  </main>
</body>
</html>
