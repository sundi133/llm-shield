title: LLM Shield
description: AI guardrails platform — input safety, output validation, and agentic security with multi-tenant policy enforcement.
remote_theme: just-the-docs/just-the-docs
url: https://sundi133.github.io
baseurl: /llm-shield

# Search
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

# Navigation
nav_external_links:
  - title: GitHub
    url: https://github.com/sundi133/llm-shield
    hide_icon: false

# Aux links (top right)
aux_links:
  "View on GitHub":
    - "https://github.com/sundi133/llm-shield"
aux_links_new_tab: true

# Footer
footer_content: "&copy; 2025 LLM Shield contributors. <a href=\"https://github.com/sundi133/llm-shield\">GitHub</a>. Distributed under the MIT License."

# Color scheme
color_scheme: dark

# Code copy button
enable_copy_code_button: true

# Heading anchors
heading_anchors: true

# Back to top
back_to_top: true
back_to_top_text: "Back to top"

# Callouts
callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude internal-only files
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
  - README.md

# Default front matter
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default
