<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" width="760" height="200" role="img" aria-label="VotalAI">
  <title>VotalAI</title>

  <!-- Recycle-with-droplet mark -->
  <g transform="translate(20, 20)" fill="none" stroke="currentColor" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
    <!-- top arrow -->
    <path d="M30 50 L80 50 L72 38 M80 50 L72 62" />
    <!-- right curve -->
    <path d="M80 50 A60 60 0 0 1 110 100 L120 96 M110 100 L100 92" />
    <!-- bottom curve -->
    <path d="M110 100 A60 60 0 0 1 50 130 L52 142 M50 130 L40 138" />
    <!-- left curve closing -->
    <path d="M50 130 A60 60 0 0 1 30 50" />

    <!-- droplet in center -->
    <path d="M75 65 C 60 90, 60 110, 75 110 C 90 110, 90 90, 75 65 Z" fill="currentColor" stroke="none"/>
  </g>

  <!-- VotalAI wordmark -->
  <text x="170" y="135"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="120"
        font-weight="700"
        letter-spacing="-3"
        fill="currentColor">VotalAI</text>
</svg>
